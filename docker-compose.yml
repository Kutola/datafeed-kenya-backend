services:
  api:
    build:
    ports:
      - "8000:800"
    environment:
      - DOCKER_DATABASE_URL=postgresql://postgres:750369@db:5432/newsfeed
      - SECRET_KEY=jejfhdfhefhe394u3nefnl3iu4hr4
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
  db:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD: 750369
      - POSTGRES_DB: newsfeed
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-EXEC", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:      